repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Fast ontology consistency gate; the full test suite runs in CI.
  - repo: local
    hooks:
      - id: ontology-sync-check
        name: Check TTL/OWL synchronization
        entry: python tools/sync_formats.py check
        language: system
        files: ^ontology/.*\.(ttl|owl)$
        pass_filenames: false
